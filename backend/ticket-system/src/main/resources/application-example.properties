spring.application.name=ticket-system

# Configuraciµn de base de datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_system?useSSL=false&serverTimezone=UTC
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciµn JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (usar variable de entorno en producciµn)
jwt.secret=${JWT_SECRET:YOUR_SUPER_SECRET_KEY}